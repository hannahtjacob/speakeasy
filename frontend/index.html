<!DOCTYPE html>
<html>
<head>
  <title>SpeakEasy Companion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>SpeakEasy</h1>
    <p>Hands-free Slack updates for safer, more accessible communication.</p>

    <button id="startButton">Start Listening</button>

    <section>
      <h2>Latest Spoken Alert</h2>
      <p id="summaryText">No alerts yet.</p>
    </section>
    <section>
      <h2>Ask SpeakEasy</h2>
      <input id="questionInput" placeholder="What is going on in the channel?" />
      <button id="askButton">Ask</button>
      <p id="answerText"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
