<!DOCTYPE html>
<html>
<head>
  <title>SpeakEasy Companion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="device">
    <header>
      <div class="app-mark" aria-hidden="true">
        <svg class="app-icon" viewBox="0 0 24 24" focusable="false">
          <path d="M12 14c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v5c0 1.66 1.34 3 3 3Z"></path>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
          <path d="M12 18v3"></path>
          <path d="M8 21h8"></path>
        </svg>
      </div>
      <h1>SpeakEasy</h1>
      <button id="drivingModeButton" class="mode-button" aria-pressed="true">
        <span class="status-dot" aria-hidden="true"></span>
        <span>Driving mode</span>
      </button>
    </header>

    <button id="startButton" aria-pressed="false">Start Listening</button>

    <section>
      <h2>Spoken Alerts</h2>
      <p id="emptyAlerts">No alerts yet.</p>
      <ul id="alertList" aria-live="polite"></ul>
    </section>

    <section>
      <h2>Ask SpeakEasy</h2>
      <label for="channelSelect">Channel</label>
      <select id="channelSelect">
        <option value="all">All channels</option>
      </select>

      <label for="questionInput">Question</label>
      <input id="questionInput" placeholder="What is going on?" />

      <button id="askButton">Ask</button>
      <p id="answerText" aria-live="polite"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
