<!DOCTYPE html>
<html>
<head>
  <title>SpeakEasy Companion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>SpeakEasy</h1>
    <p>Hands-free Slack updates for safer, more accessible communication.</p>

    <button id="startButton" aria-pressed="false">Start Listening</button>

    <section>
      <h2>Spoken Alerts</h2>
      <p id="emptyAlerts">No alerts yet.</p>
      <ul id="alertList" aria-live="polite"></ul>
    </section>

    <section>
      <h2>Ask SpeakEasy</h2>
      <label for="channelSelect">Channel</label>
      <select id="channelSelect">
        <option value="all">All channels</option>
      </select>

      <label for="questionInput">Question</label>
      <input id="questionInput" placeholder="What is going on?" />

      <button id="askButton">Ask</button>
      <p id="answerText" aria-live="polite"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
